openapi: 3.0.0
info:
  title: Node.js API
  version: 1.0.0
  description: API documentation
servers:
  - url: http://localhost:4000
    description: Development server
  - url: https://angular-21-boilerplate-2-1.onrender.com
    description: Production server
paths:
  /:
    get:
      summary: Get API status
      responses:
        '200':
          description: API is running
  /accounts/authenticate:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Authentication successful
  /accounts/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                acceptTerms:
                  type: boolean
      responses:
        '200':
          description: Registration successful
  /db/test:
    get:
      summary: Test database connection
      responses:
        '200':
          description: Database connection successful